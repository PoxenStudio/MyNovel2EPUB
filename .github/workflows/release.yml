# .github/workflows/release.yml
name: release
on:
  push:
    tags: ["v*"]

jobs:
  permissions:
    contents: write

  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          cache: rust
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build || echo "no build script"
      - name: Tauri build
        run: |
          set -e
          # Try using npm script and pass args correctly
          if npm run tauri -- build --release >/dev/null 2>&1; then
            echo "ran npm run tauri -- build --release"
          else
            # Fallback to local tauri CLI via npx (no install)
            if npx --no-install tauri build --release >/dev/null 2>&1; then
              echo "ran npx --no-install tauri build --release"
            else
              echo "Tauri build failed or tauri CLI not available; ensure @tauri-apps/cli is installed in devDependencies" >&2
              exit 1
            fi
          fi
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-bundle
          path: |
            src-tauri/target/release/bundle

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List downloaded artifacts
        run: ls -laR artifacts || true
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "MyNovel2EPUB ${{ github.ref_name }}"
          draft: true

      - name: Upload macOS and Windows installers to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -euo pipefail
          echo "Searching for macOS (.dmg .pkg .zip .tar.gz) and Windows (.exe .msi .zip) installers..."
          find artifacts -type f \( -iname "*.dmg" -o -iname "*.pkg" -o -iname "*.zip" -o -iname "*.tar.gz" -o -iname "*.exe" -o -iname "*.msi" \) -print0 | while IFS= read -r -d '' file; do
            name=$(basename "$file")
            # Filter by platform: skip archive types that are ambiguous if needed; here we upload both mac and win matches
            case "$name" in
              *.dmg) content_type="application/x-apple-diskimage" ;;
              *.pkg) content_type="application/octet-stream" ;;
              *.zip) content_type="application/zip" ;;
              *.tar.gz) content_type="application/gzip" ;;
              *.exe) content_type="application/vnd.microsoft.portable-executable" ;;
              *.msi) content_type="application/x-msi" ;;
              *) content_type="application/octet-stream" ;;
            esac
            echo "Uploading $file as $name (type: $content_type)"
            curl --fail -sS -X POST "${UPLOAD_URL}?name=$(printf '%s' "$name" | sed -e 's/ /%20/g')" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              --data-binary @"$file"
          done

