# .github/workflows/release.yml
name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          cache: rust
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Build web assets
        run: pnpm run build
      - name: Tauri build
        shell: bash
        run: |
          set -e
          pnpm exec tauri build
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-bundle
          path: |
            src-tauri/target/release/bundle

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List downloaded artifacts
        run: ls -laR artifacts || true
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "MyNovel2EPUB ${{ github.ref_name }}"
          draft: true

      - name: Upload macOS and Windows installers to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -euo pipefail
          upload_base="${UPLOAD_URL%%\{*}"
          echo "Searching for macOS (.dmg) and Windows (.exe) installers..."
          found_mac=0
          found_win=0
          # macOS: prefer .dmg
          while IFS= read -r -d '' file; do
            name=$(basename "$file")
            asset_name="MyNovel2EPUB-${{ github.ref_name }}-mac-${name}"
            content_type="application/x-apple-diskimage"
            echo "Uploading macOS asset $file as $asset_name"
            curl --fail -sS -X POST "${upload_base}?name=$(printf '%s' "$asset_name" | sed -e 's/ /%20/g')" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              --data-binary @"$file"
            found_mac=1
          done < <(find artifacts -type f -iname "*.dmg" -print0)

          # windows: prefer .exe
          while IFS= read -r -d '' file; do
            name=$(basename "$file")
            asset_name="MyNovel2EPUB-${{ github.ref_name }}-win-${name}"
            content_type="application/vnd.microsoft.portable-executable"
            echo "Uploading windows asset $file as $asset_name"
            curl --fail -sS -X POST "${upload_base}?name=$(printf '%s' "$asset_name" | sed -e 's/ /%20/g')" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              --data-binary @"$file"
            found_win=1
          done < <(find artifacts -type f -iname "*.exe" -print0)

          if [ "$found_mac" -eq 0 ] && [ "$found_win" -eq 0 ]; then
            echo "No .dmg or .exe installers found to upload" >&2
            exit 1
          fi

